version: 2
project_name: seekmoon
before:
  hooks:
    - go mod tidy
builds:
  - id: seekmoon
    main: ./cmd/seekmoon
    binary: seekmoon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - id: seekmoon
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
checksum:
  name_template: "checksums.txt"
snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
changelog:
  disable: true
