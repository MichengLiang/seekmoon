name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: bookshelf/pnpm-lock.yaml
      - uses: actions/configure-pages@v6
      - run: pnpm install --frozen-lockfile
        working-directory: bookshelf
      - run: pnpm run check
        working-directory: bookshelf
      - run: pnpm run build
        working-directory: bookshelf
      - uses: actions/upload-pages-artifact@v5
        with:
          path: bookshelf/build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
